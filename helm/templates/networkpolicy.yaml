{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "task-manager.fullname" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "task-manager.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic only from the Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "traefik" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 8443

    # Allow traffic from Prometheus scraper (metrics)
    {{- if .Values.networkPolicy.allowPrometheus }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8443
    {{- end }}

  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow access to PostgreSQL (Cloud SQL proxy on localhost, or direct TCP)
    - ports:
        - protocol: TCP
          port: 5432
      {{- if .Values.networkPolicy.dbNamespace }}
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dbNamespace }}
      {{- end }}

    # Cloud SQL Auth Proxy needs HTTPS to the Google API
    {{- if .Values.cloudSQL.enabled }}
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
