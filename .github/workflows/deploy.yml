name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to git SHA)"
        required: false

permissions:
  id-token: write   # Required for WIF OIDC
  contents: read

env:
  TF_VERSION: "1.8.0"
  REGISTRY: "europe-west1-docker.pkg.dev"
  IMAGE_NAME: "iac-epitech-489911/task-manager/task-manager"

jobs:
  build-push:
    name: Build & push Docker image
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Compute image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          TAG="${{ steps.meta.outputs.image_tag }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" task-manager/
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # ── Staging ──────────────────────────────────────────────────────────────────

  staging-infra:
    name: "Staging — phase 1 (infra)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: staging
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/staging"
        working-directory: terraform

      - name: Remove stale non-indexed NAT state entries (idempotent)
        working-directory: terraform
        run: |
          terraform state rm 'google_compute_router.nat_router' || true
          terraform state rm 'google_compute_router_nat.nat' || true

      - name: Import existing resources (idempotent)
        working-directory: terraform
        run: |
          bash scripts/import-existing.sh staging \
            -var-file=envs/staging/terraform.tfvars \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"

      - name: Import GKE resources explicitly
        working-directory: terraform
        run: |
          TF_VARS=(
            -var-file=envs/staging/terraform.tfvars
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"
            -var="api_password=${{ secrets.API_PASSWORD }}"
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}"
            -var="github_pat=${{ secrets.GIT_PAT }}"
          )
          terraform state show module.gke.google_container_cluster.main \
            || terraform import "${TF_VARS[@]}" \
               module.gke.google_container_cluster.main \
               "projects/iac-epitech-489911/locations/europe-west1/clusters/task-manager-staging"
          terraform state show module.gke.google_container_node_pool.main \
            || terraform import "${TF_VARS[@]}" \
               module.gke.google_container_node_pool.main \
               "projects/iac-epitech-489911/locations/europe-west1/clusters/task-manager-staging/nodePools/task-manager-staging-node-pool"

      - name: Terraform apply — infra
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.secretmanager \
            -target=google_project_service.servicenetworking \
            -target=google_compute_global_address.private_ip_range \
            -target=google_service_networking_connection.private_vpc_connection \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -target=module.gke \
            -target=module.cloudsql \
            -var-file="envs/staging/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

      - name: Sync Cloud SQL password from Secret Manager
        run: |
          PASSWORD=$(gcloud secrets versions access latest \
            --secret="task-manager-staging-db-password" \
            --project=iac-epitech-489911)
          gcloud sql users set-password taskuser \
            --instance=task-manager-staging-db \
            --password="${PASSWORD}" \
            --project=iac-epitech-489911

  staging-helm:
    name: "Staging — phase 2 (helm)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: staging
    needs: [build-push, staging-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI (with GKE auth plugin)
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials task-manager-staging \
            --region europe-west1 \
            --project iac-epitech-489911

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/staging"
        working-directory: terraform

      - name: Import existing helm resources (idempotent)
        working-directory: terraform
        run: |
          import_if_missing() {
            local resource="$1"; local id="$2"
            if terraform state show "${resource}" > /dev/null 2>&1; then
              echo "  [skip] ${resource}"
            else
              echo "  [import] ${resource}"
              terraform import \
                -var-file="envs/staging/terraform.tfvars" \
                -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
                -var="api_password=${{ secrets.API_PASSWORD }}" \
                -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
                -var="github_pat=${{ secrets.GIT_PAT }}" \
                -var="image_tag=placeholder" \
                "${resource}" "${id}" || echo "  [warn] import failed, may not exist yet"
            fi
          }
          import_if_missing module.helm.kubernetes_namespace.app task-manager
          import_if_missing module.helm.helm_release.cert_manager cert-manager/cert-manager
          import_if_missing module.helm.helm_release.traefik traefik/traefik
          import_if_missing module.helm.helm_release.task_manager task-manager/task-manager
          import_if_missing module.helm.helm_release.kube_prometheus_stack monitoring/monitoring
          import_if_missing module.helm.helm_release.arc_controller arc-systems/arc
          import_if_missing module.helm.helm_release.arc_runner_set arc-runners/arc-runner-set

      - name: Apply ClusterIssuers
        run: |
          kubectl wait --for=condition=established --timeout=300s \
            crd/clusterissuers.cert-manager.io
          kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-staging
          spec:
            acme:
              server: https://acme-staging-v02.api.letsencrypt.org/directory
              email: matheo@aureagames.com
              privateKeySecretRef:
                name: letsencrypt-staging-account-key
              solvers:
                - http01:
                    ingress:
                      ingressClassName: traefik
          ---
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: matheo@aureagames.com
              privateKeySecretRef:
                name: letsencrypt-prod-account-key
              solvers:
                - http01:
                    ingress:
                      ingressClassName: traefik
          EOF

      - name: Terraform apply — helm
        run: |
          IMAGE_REPO=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          terraform apply -auto-approve \
            -target=module.helm \
            -var-file="envs/staging/terraform.tfvars" \
            -var="image_tag=${{ needs.build-push.outputs.image_tag }}" \
            -var="image_repo=${IMAGE_REPO}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

  # ── Prod ─────────────────────────────────────────────────────────────────────

  prod-infra:
    name: "Prod — phase 1 (infra)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: prod
    needs: staging-helm
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/prod"
        working-directory: terraform

      - name: Import existing resources (idempotent)
        working-directory: terraform
        run: |
          bash scripts/import-existing.sh prod \
            -var-file=envs/prod/terraform.tfvars \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"

      - name: Import GKE resources explicitly
        working-directory: terraform
        run: |
          TF_VARS=(
            -var-file=envs/prod/terraform.tfvars
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"
            -var="api_password=${{ secrets.API_PASSWORD }}"
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}"
            -var="github_pat=${{ secrets.GIT_PAT }}"
          )
          terraform state show module.gke.google_container_cluster.main \
            || terraform import "${TF_VARS[@]}" \
               module.gke.google_container_cluster.main \
               "projects/iac-epitech-489911/locations/europe-west1/clusters/task-manager-prod"
          terraform state show module.gke.google_container_node_pool.main \
            || terraform import "${TF_VARS[@]}" \
               module.gke.google_container_node_pool.main \
               "projects/iac-epitech-489911/locations/europe-west1/clusters/task-manager-prod/nodePools/task-manager-prod-node-pool" \
            || echo "  [skip] node pool not yet created, Terraform will create it"

      - name: Terraform apply — infra
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.secretmanager \
            -target=google_project_service.servicenetworking \
            -target=google_compute_global_address.private_ip_range \
            -target=google_service_networking_connection.private_vpc_connection \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -target=module.gke \
            -target=module.cloudsql \
            -var-file="envs/prod/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

      - name: Sync Cloud SQL password from Secret Manager
        run: |
          PASSWORD=$(gcloud secrets versions access latest \
            --secret="task-manager-prod-db-password" \
            --project=iac-epitech-489911)
          gcloud sql users set-password taskuser \
            --instance=task-manager-prod-db \
            --password="${PASSWORD}" \
            --project=iac-epitech-489911

  prod-helm:
    name: "Prod — phase 2 (helm)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: prod
    needs: [build-push, prod-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI (with GKE auth plugin)
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin"

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials task-manager-prod \
            --region europe-west1 \
            --project iac-epitech-489911

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/prod"
        working-directory: terraform

      - name: Import existing helm resources (idempotent)
        working-directory: terraform
        run: |
          import_if_missing() {
            local resource="$1"; local id="$2"
            if terraform state show "${resource}" > /dev/null 2>&1; then
              echo "  [skip] ${resource}"
            else
              echo "  [import] ${resource}"
              terraform import \
                -var-file="envs/prod/terraform.tfvars" \
                -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
                -var="api_password=${{ secrets.API_PASSWORD }}" \
                -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
                -var="github_pat=${{ secrets.GIT_PAT }}" \
                -var="image_tag=placeholder" \
                "${resource}" "${id}" || echo "  [warn] import failed, may not exist yet"
            fi
          }
          import_if_missing module.helm.kubernetes_namespace.app task-manager
          import_if_missing module.helm.helm_release.cert_manager cert-manager/cert-manager
          import_if_missing module.helm.helm_release.traefik traefik/traefik
          import_if_missing module.helm.helm_release.task_manager task-manager/task-manager
          import_if_missing module.helm.helm_release.kube_prometheus_stack monitoring/monitoring
          import_if_missing module.helm.helm_release.arc_controller arc-systems/arc
          import_if_missing module.helm.helm_release.arc_runner_set arc-runners/arc-runner-set

      - name: Apply ClusterIssuers
        run: |
          kubectl wait --for=condition=established --timeout=300s \
            crd/clusterissuers.cert-manager.io
          kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-staging
          spec:
            acme:
              server: https://acme-staging-v02.api.letsencrypt.org/directory
              email: matheo@aureagames.com
              privateKeySecretRef:
                name: letsencrypt-staging-account-key
              solvers:
                - http01:
                    ingress:
                      ingressClassName: traefik
          ---
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: matheo@aureagames.com
              privateKeySecretRef:
                name: letsencrypt-prod-account-key
              solvers:
                - http01:
                    ingress:
                      ingressClassName: traefik
          EOF

      - name: Terraform apply — helm
        run: |
          IMAGE_REPO=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          terraform apply -auto-approve \
            -var-file="envs/prod/terraform.tfvars" \
            -var="image_tag=${{ needs.build-push.outputs.image_tag }}" \
            -var="image_repo=${IMAGE_REPO}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform
