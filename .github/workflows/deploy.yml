name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to git SHA)"
        required: false

permissions:
  id-token: write   # Required for WIF OIDC
  contents: read

env:
  TF_VERSION: "1.8.0"
  REGISTRY: "europe-west1-docker.pkg.dev"
  IMAGE_NAME: "iac-epitech-489911/task-manager/task-manager"

jobs:
  build-push:
    name: Build & push Docker image
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Compute image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          TAG="${{ steps.meta.outputs.image_tag }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" task-manager/
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # ── Staging ──────────────────────────────────────────────────────────────────

  staging-infra:
    name: "Staging — phase 1 (infra)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: staging
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/staging"
        working-directory: terraform

      - name: Import existing resources (idempotent)
        working-directory: terraform
        run: |
          bash scripts/import-existing.sh staging \
            -var-file=envs/staging/terraform.tfvars \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"

      - name: Terraform apply — infra
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.secretmanager \
            -target=google_project_service.servicenetworking \
            -target=google_compute_global_address.private_ip_range \
            -target=google_service_networking_connection.private_vpc_connection \
            -target=google_compute_router.nat_router \
            -target=google_compute_router_nat.nat \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -target=module.gke \
            -target=module.cloudsql \
            -var-file="envs/staging/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

  staging-helm:
    name: "Staging — phase 2 (helm)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: staging
    needs: [build-push, staging-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
            | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg \
            | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          sudo apt-get update -y
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials task-manager-staging \
            --region europe-west1 \
            --project iac-epitech-489911

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/staging"
        working-directory: terraform

      - name: Terraform apply — helm
        run: |
          IMAGE_REPO=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          terraform apply -auto-approve \
            -var-file="envs/staging/terraform.tfvars" \
            -var="image_tag=${{ needs.build-push.outputs.image_tag }}" \
            -var="image_repo=${IMAGE_REPO}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

  # ── Prod ─────────────────────────────────────────────────────────────────────

  prod-infra:
    name: "Prod — phase 1 (infra)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: prod
    needs: staging-helm
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/prod"
        working-directory: terraform

      - name: Import existing resources (idempotent)
        working-directory: terraform
        run: |
          bash scripts/import-existing.sh prod \
            -var-file=envs/prod/terraform.tfvars \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"

      - name: Terraform apply — infra
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.secretmanager \
            -target=google_project_service.servicenetworking \
            -target=google_compute_global_address.private_ip_range \
            -target=google_service_networking_connection.private_vpc_connection \
            -target=google_compute_router.nat_router \
            -target=google_compute_router_nat.nat \
            -target=google_iam_workload_identity_pool.github \
            -target=google_iam_workload_identity_pool_provider.github \
            -target=google_service_account.github_actions \
            -target=module.gke \
            -target=module.cloudsql \
            -var-file="envs/prod/terraform.tfvars" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform

  prod-helm:
    name: "Prod — phase 2 (helm)"
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    environment: prod
    needs: [build-push, prod-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
            | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg \
            | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          sudo apt-get update -y
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get kubeconfig
        run: |
          gcloud container clusters get-credentials task-manager-prod \
            --region europe-west1 \
            --project iac-epitech-489911

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend-config="prefix=task-manager/prod"
        working-directory: terraform

      - name: Terraform apply — helm
        run: |
          IMAGE_REPO=$(printf '%s/%s' "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" | tr -d '\r\n ')
          terraform apply -auto-approve \
            -var-file="envs/prod/terraform.tfvars" \
            -var="image_tag=${{ needs.build-push.outputs.image_tag }}" \
            -var="image_repo=${IMAGE_REPO}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="api_password=${{ secrets.API_PASSWORD }}" \
            -var="grafana_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -var="github_pat=${{ secrets.GIT_PAT }}"
        working-directory: terraform
